services:
  db:
    image: mysql:8.0
    container_name: teamsys_db
    restart: always
    environment:
      MYSQL_DATABASE: db_portafolios_tis
      MYSQL_USER: teamsys
      MYSQL_PASSWORD: teamsys123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./Tis-back
    container_name: tis-back
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: db_portafolios_tis
      DB_USER: root
      DB_PASSWORD: root123
      BREVO_KEY: TU_CLAVE_REAL_DE_BREVO
      BREVO_EMAIL: 202103868@est.umss.edu
      URL_FRONT: http://localhost:5173
      JWT_SECRET: una_clave_secreta_muy_larga_y_segura_para_local
      PORT: 8081
    depends_on:
      - db

  frontend:
    build:
      context: ./Tis-front
      args:
        VITE_API_URL: https://teamsysback.apps.cs.umss.edu.bo/api
    container_name: tis-front
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
