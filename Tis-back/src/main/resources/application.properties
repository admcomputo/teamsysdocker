spring.application.name=Tis-back

# ELIMINADO: Ya no importamos 'env.properties' para que no dependa de archivos locales externos
#spring.config.import=optional:file:env.properties
# Datos de conexion inyectados por Docker-Compose
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Configuracion de Hibernate y JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto dinamico para el servidor (inyectado por Docker)
server.port=${PORT}

# Configuracion de servicios externos (inyectados por Docker)
brevo.api.key=${BREVO_KEY}
brevo.email.from=${BREVO_EMAIL}
url.front=${URL_FRONT}

# Seguridad JWT
jwt.secret=${JWT_SECRET}